version: 2

project_name: iaws

builds:
  - id: iaws
    binary: iaws
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# 不打 tar 包，每个构建产物为单个二进制直接上传
archives:
  - format: binary

# owner/name 未填时使用 GITHUB_REPOSITORY（当前仓库）
release:
  draft: false
  # 若需适配任意仓库，可改为不填 owner/name，由 CI 环境自动识别
